{{ define "main" }}
<div class="pt-16">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <h1 class="text-3xl font-bold mb-8">{{ .Title }}</h1>
    {{ .Content }}
    {{ range .Pages.ByWeight }}
    <div class="mb-4">
      <a href="{{ .RelPermalink }}" class="text-accent hover:text-accent-light transition-colors font-medium">{{ .Title }}</a>
      {{ with .Description }}<p class="text-sm text-muted mt-1">{{ . }}</p>{{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
