{{ define "main" }}
<div class="pt-16">
  <div class="max-w-[90rem] mx-auto px-4 sm:px-6 lg:px-8">
    <div class="lg:flex">
      <!-- Mobile sidebar toggle -->
      <button id="sidebar-open" class="lg:hidden fixed bottom-5 right-5 z-40 p-3 bg-accent text-white rounded-full shadow-lg shadow-accent/20 hover:bg-accent-light transition-colors" aria-label="Open sidebar">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <!-- Sidebar overlay -->
      <div id="sidebar-overlay" class="hidden fixed inset-0 bg-bg/80 backdrop-blur-sm z-30 lg:hidden"></div>

      <!-- Sidebar -->
      <aside id="sidebar" class="fixed top-16 left-0 bottom-0 w-72 bg-bg border-r border-border z-40 overflow-y-auto transform -translate-x-full lg:translate-x-0 lg:sticky lg:top-16 lg:h-[calc(100vh-4rem)] lg:w-64 lg:shrink-0 lg:border-r-0 transition-transform duration-200">
        {{ partial "sidebar.html" . }}
      </aside>

      <!-- Content -->
      <article class="flex-1 min-w-0 py-8 px-4 sm:px-6 lg:px-12">
        <div class="prose max-w-3xl">
          <h1>{{ .Title }}</h1>
          {{ .Content }}
        </div>

        <!-- Prev / Next -->
        {{ $pages := .CurrentSection.Pages.ByWeight }}
        <nav class="mt-16 pt-6 border-t border-divider flex justify-between max-w-3xl text-sm">
          {{ with .PrevInSection }}
          <a href="{{ .RelPermalink }}" class="group flex items-center gap-2 text-muted hover:text-accent transition-colors">
            <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            {{ .Title }}
          </a>
          {{ else }}<span></span>{{ end }}
          {{ with .NextInSection }}
          <a href="{{ .RelPermalink }}" class="group flex items-center gap-2 text-muted hover:text-accent transition-colors">
            {{ .Title }}
            <svg class="w-4 h-4 group-hover:translate-x-0.5 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </a>
          {{ else }}<span></span>{{ end }}
        </nav>
      </article>

      <!-- TOC -->
      {{ partial "toc.html" . }}
    </div>
  </div>
</div>
{{ end }}
